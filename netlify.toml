# Cấu hình chung cho tất cả các hàm
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Cấu hình lịch chạy cụ thể cho hàm 'checkForNewChapters'
# Tên [functions.checkForNewChapters] phải khớp với tên tệp hàm (checkForNewChapters.ts)
[functions.checkForNewChapters]
  # Cron expression: Chạy vào phút thứ 0 của mỗi giờ
  schedule = "0 * * * *"
